# This rule is not used by the project site-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the site.epcnetwork.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: site-operator
    app.kubernetes.io/managed-by: kustomize
  name: site-editor-role
rules:
- apiGroups:
  - site.epcnetwork.io
  resources:
  - sites
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - site.epcnetwork.io
  resources:
  - sites/status
  verbs:
  - get
