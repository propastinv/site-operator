apiVersion: site.operator/v1alpha1
kind: Site
metadata:
  name: test-site
  namespace: site-operator
spec:
  domain: example.com
  ingress:
    enabled: true
    path: /
    tls: true
    ingressClassName: nginx
    annotations: {}
  database:
    host: localhost
    name: testdb
    user: testuser
    passwordSecret:
      name: db-password
      key: password
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: standard